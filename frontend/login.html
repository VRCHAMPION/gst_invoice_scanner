<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GST Invoice Scanner</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/auth.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: var(--surface-color);
        }
        .login-left {
            flex: 1.2;
            background-color: var(--ink);
            color: white;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 1;
        }
        .login-left::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(#ffffff11 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }
        .login-right {
            flex: 1;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-color: var(--surface-color);
        }
        .app-title {
            font-size: 4rem;
            line-height: 0.9;
            margin-bottom: 2rem;
        }
        .feature-list {
            list-style: none;
            margin-top: 3rem;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            font-weight: 500;
        }
        .feature-dot {
            width: 12px;
            height: 12px;
            background: var(--secondary-accent);
            border-radius: 50%;
        }
        .login-form-card {
            max-width: 400px;
            width: 100%;
        }
        .login-header {
            margin-bottom: 3rem;
        }
        .login-header h2 {
            font-size: 2.5rem;
            color: var(--primary-accent);
        }
        .toggle-password {
            float: right;
            margin-top: -30px;
            position: relative;
            z-index: 2;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
        }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 1.5rem 0;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .tagline {
            font-size: 1.2rem;
            opacity: 0.8;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <!-- CURSOR -->
    <div id="cursor"></div>
    <div id="cursor-ring"></div>

    <div class="login-left animate-fade-up">
        <h1 class="app-title brand-font">GST<br>Invoice<br>Scanner</h1>
        <p class="tagline">Smart data extraction to help you manage your business.</p>
        
        <ul class="feature-list">
            <li class="feature-item stagger-1"><div class="feature-dot"></div> Smart OCR Extraction</li>
            <li class="feature-item stagger-2"><div class="feature-dot"></div> Invoice Health Scoring</li>
            <li class="feature-item stagger-3"><div class="feature-dot"></div> Easy ITC Calculator</li>
        </ul>
    </div>

    <div class="login-right animate-fade-up stagger-1">
        <div class="login-form-card">
            <div class="login-header">
                <h2>Sign in to your account</h2>
                <p>Welcome back. Manage your invoices below.</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required autocomplete="current-password">
                    <span class="toggle-password" onclick="togglePassword()">Show</span>
                </div>
                
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe"> Remember me
                </label>

                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Sign in
                </button>
            </form>

            <p class="mt-2" style="font-size: 0.9rem; color: var(--text-muted);">
                Don't have an account? <a href="register.html" style="color: var(--secondary-accent); text-decoration: none; font-weight: 600;">Create account</a>
            </p>
            
            <div id="errorMessage" class="mt-1" style="color: var(--danger); font-weight: 600; display: none;"></div>
        </div>
    </div>

    <script src="js/cursor.js"></script>
    <script src="js/auth.js"></script>
    <script>
        function togglePassword() {
            const pwd = document.getElementById('password');
            const toggle = document.querySelector('.toggle-password');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                toggle.textContent = 'Hide';
            } else {
                pwd.type = 'password';
                toggle.textContent = 'Show';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const remember = document.getElementById('rememberMe').checked;
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            if (remember) {
                localStorage.setItem('rememberedUser', email);
            } else {
                localStorage.removeItem('rememberedUser');
            }

            submitBtn.textContent = 'Signing in...';
            submitBtn.disabled = true;

            const result = await login(email, pass);
            if (result.success) {
                window.location.href = 'upload.html';
            } else {
                const error = document.getElementById('errorMessage');
                error.textContent = result.message;
                error.style.display = 'block';
                submitBtn.textContent = 'Sign in';
                submitBtn.disabled = false;
            }
        });

        // Load remembered user
        window.onload = () => {
            const saved = localStorage.getItem('rememberedUser');
            if (saved) {
                document.getElementById('email').value = saved;
                document.getElementById('rememberMe').checked = true;
            }
        };
    </script>
</body>
</html>
