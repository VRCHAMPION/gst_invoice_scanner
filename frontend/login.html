<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GST Invoice Scanner</title>
    <meta name="description" content="Sign in to GST Invoice Scanner to manage your invoices, track ITC, and view compliance health scores." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: var(--surface-color);
        }
        .login-left {
            flex: 1.2;
            background-color: var(--ink);
            color: white;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 1;
        }
        .login-left::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(#ffffff11 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }
        .login-right {
            flex: 1;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-color: var(--surface-color);
        }
        .app-title {
            font-size: 4rem;
            line-height: 0.9;
            margin-bottom: 2rem;
        }
        .feature-list {
            list-style: none;
            margin-top: 3rem;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            font-weight: 500;
        }
        .feature-dot {
            width: 12px;
            height: 12px;
            background: var(--secondary-accent);
            border-radius: 50%;
        }
        .login-form-card {
            max-width: 400px;
            width: 100%;
        }
        .login-header {
            margin-bottom: 3rem;
        }
        .login-header h2 {
            font-size: 2.5rem;
            color: var(--primary-accent);
        }
        .toggle-password {
            float: right;
            margin-top: -30px;
            position: relative;
            z-index: 2;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
        }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 1.5rem 0;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .tagline {
            font-size: 1.2rem;
            opacity: 0.8;
            max-width: 400px;
        }

        /* ── MOBILE ── */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
                overflow-y: auto;
            }
            .login-left {
                display: none;
            }
            .login-right {
                flex: 1;
                padding: 1.5rem;
                justify-content: flex-start;
                padding-top: 2.5rem;
            }
            .login-form-card {
                max-width: 100%;
                width: 100%;
            }
            .mobile-brand-header {
                display: block;
                font-size: 1.4rem;
                font-weight: 900;
                color: var(--ink);
                letter-spacing: -0.5px;
                margin-bottom: 2rem;
                font-family: var(--display);
            }
            .login-header h2 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- CURSOR -->
    <div id="cursor"></div>
    <div id="cursor-ring"></div>

    <div class="login-left animate-fade-up">
        <h1 class="app-title brand-font">GST<br>Invoice<br>Scanner</h1>
        <p class="tagline">Smart data extraction to help you manage your business.</p>
        
        <ul class="feature-list">
            <li class="feature-item stagger-1"><div class="feature-dot"></div> Smart OCR Extraction</li>
            <li class="feature-item stagger-2"><div class="feature-dot"></div> Invoice Health Scoring</li>
            <li class="feature-item stagger-3"><div class="feature-dot"></div> Easy ITC Calculator</li>
        </ul>
    </div>

    <div class="login-right animate-fade-up stagger-1">
        <div class="login-form-card">
            <span class="mobile-brand-header" style="display: none;">GST Scanner</span>
            <div class="login-header">
                <h2>Sign in to your account</h2>
                <p>Welcome back. Manage your invoices below.</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required autocomplete="current-password">
                    <span class="toggle-password" onclick="togglePassword()">Show</span>
                </div>
                
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe"> Remember me
                </label>

                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Sign in
                </button>
                
                <div style="display: flex; align-items: center; margin: 1.5rem 0; color: var(--text-muted); font-size: 0.9rem;">
                    <div style="flex: 1; height: 1px; background: var(--border);"></div>
                    <span style="padding: 0 10px;">or continue with</span>
                    <div style="flex: 1; height: 1px; background: var(--border);"></div>
                </div>

                <button type="button" class="btn btn-outline" style="width: 100%; justify-content: center;" onclick="loginWithGoogle()">
                    <svg width="18" height="18" viewBox="0 0 48 48" style="margin-right: 8px;">
                      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    </svg>
                    Google
                </button>
            </form>

            <p class="mt-2" style="font-size: 0.9rem; color: var(--text-muted);">
                Don't have an account? <a href="register.html" style="color: var(--secondary-accent); text-decoration: none; font-weight: 600;">Create account</a>
            </p>
            
            <div id="errorMessage" class="mt-1" style="color: var(--danger); font-weight: 600; display: none;"></div>
        </div>
    </div>

    <script src="js/cursor.js?v=1.2"></script>
    <script src="js/env.js"></script>
    <script src="js/config.js?v=1.2"></script>
    <script src="js/utils.js?v=1.2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js?v=1.2"></script>
    <script src="js/page-login.js?v=1.2"></script>
</body>
</html>
