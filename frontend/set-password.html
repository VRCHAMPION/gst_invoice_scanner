<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Password | GST Invoice Scanner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: var(--bg); }
        .password-card {
            width: 100%; max-width: 480px;
            padding: 3rem;
            background: var(--white);
            border-radius: var(--rl);
            border: 1px solid var(--border);
            box-shadow: 0 24px 64px rgba(0,0,0,0.07);
        }
    </style>
</head>
<body>
    <div id="cursor"></div>
    <div id="cursor-ring"></div>

    <div class="password-card animate-fade-up">
        <h2 class="brand-font" style="margin-bottom: 0.5rem;">Secure your account</h2>
        <p class="mb-3 text-muted">You signed in with Google. Please set a password so you can also sign in with your email directly.</p>
        
        <form id="setPasswordForm">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="password" required placeholder="Minimum 8 characters">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" required placeholder="Minimum 8 characters">
            </div>
            
            <div id="errorMessage" class="mt-2" style="color: var(--red); display: none; font-weight: 600;"></div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;">
                Set Password
            </button>
            <button type="button" id="skipBtn" class="btn btn-outline" style="width: 100%; margin-top: 0.5rem; justify-content: center;">
                Skip for now
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js?v=1.3"></script>
    <script src="js/utils.js?v=1.3"></script>
    <script src="js/auth.js?v=1.3"></script>
    <script src="js/cursor.js?v=1.3"></script>
    <script>
        document.getElementById('setPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pass = document.getElementById('password').value;
            const conf = document.getElementById('confirmPassword').value;
            const errBox = document.getElementById('errorMessage');
            const btn = e.target.querySelector('button[type="submit"]');

            if (pass !== conf) {
                errBox.textContent = 'Passwords do not match';
                errBox.style.display = 'block';
                return;
            }
            if (pass.length < 8) {
                errBox.textContent = 'Password must be at least 8 characters';
                errBox.style.display = 'block';
                return;
            }

            btn.textContent = 'Saving...';
            btn.disabled = true;

            const { error } = await _supabase.auth.updateUser({ 
                password: pass,
                data: { password_set: true }
            });

            if (error) {
                errBox.textContent = error.message;
                errBox.style.display = 'block';
                btn.textContent = 'Set Password';
                btn.disabled = false;
            } else {
                continueOnboarding();
            }
        });

        document.getElementById('skipBtn').addEventListener('click', async () => {
            const btn = document.getElementById('skipBtn');
            btn.textContent = 'Skipping...';
            btn.disabled = true;
            
            // Mark as skipped so we don't ask again
            await _supabase.auth.updateUser({ 
                data: { password_set: true }
            });
            continueOnboarding();
        });

        function continueOnboarding() {
            const userData = JSON.parse(sessionStorage.getItem('currentUser') || '{}');
            const user = getCurrentUser();
            const onboardingComplete = user?.user_metadata?.onboarding_complete || userData?.company_id;
            window.location.href = onboardingComplete ? 'upload.html' : 'onboarding.html';
        }
    </script>
</body>
</html>
