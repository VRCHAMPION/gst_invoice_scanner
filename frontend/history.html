<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice History | GST Invoice Scanner</title>
    <meta name="description" content="Browse your complete GST invoice scan history with health scores, ITC amounts, and compliance status for every invoice." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="css/style.css">

    <script src="js/config.js?v=1.2"></script>
    <script src="js/utils.js?v=1.2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js?v=1.2"></script>
    <style>
        .history-controls {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            margin-bottom: 1rem;
            background: var(--white);
            padding: 1.5rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            flex-wrap: wrap;
        }

        .advanced-filters {
            background: var(--white);
            padding: 1.5rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            margin-bottom: 2rem;
        }

        .btn-prime {
            background: var(--blue); 
            color: #fff; 
            box-shadow: 0 4px 16px rgba(0, 71, 255, 0.25);
            border: none;
            cursor: pointer;
            font-family: var(--display);
            font-weight: 800;
            border-radius: 100px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn-prime:hover {
            transform: translateY(-2px) scale(1.02); 
            box-shadow: 0 8px 24px rgba(0, 71, 255, 0.35);
        }
        
        .btn-outline {
            background: transparent; 
            color: var(--ink); 
            border: 1.5px solid var(--border);
            cursor: pointer;
            font-family: var(--display);
            font-weight: 800;
            border-radius: 100px;
            transition: transform 0.2s, border-color 0.2s, background 0.2s;
        }
        
        .btn-outline:hover {
            border-color: var(--ink); 
            background: var(--bg2); 
            transform: translateY(-2px);
        }

        .search-container {
            flex: 2;
            min-width: 300px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 2.5rem !important;
            border: 1px solid var(--border) !important;
            border-radius: 4px !important;
            font-family: var(--mono);
            font-size: 0.9rem;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
        }

        .filter-select {
            width: 100%; 
            padding: 0.8rem 1rem; 
            border: 1px solid var(--border); 
            border-radius: 4px; 
            font-family: var(--mono); 
            font-weight: 600; 
            color: var(--ink); 
            outline: none;
            background: var(--bg2);
            cursor: pointer;
        }

        .sort-icon {
            font-size: 0.6rem;
            margin-left: 0.5rem;
            display: inline-block;
            transition: 0.3s;
            color: var(--muted);
        }

        .sortable {
            cursor: pointer;
            user-select: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
        }

        .sortable:hover .sort-icon {
            color: var(--blue);
        }

        table {
            border-collapse: separate;
            border-spacing: 0 8px;
            width: 100%;
        }

        th {
            padding: 1rem 1.5rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        tr[data-id] {
            cursor: pointer;
            background: var(--white);
            transition: transform 0.2s cubic-bezier(0.1, 0.9, 0.2, 1), box-shadow 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.01);
        }

        tr[data-id] td {
            padding: 1.2rem 1.5rem;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        tr[data-id] td:first-child {
            border-left: 1px solid var(--border);
            border-top-left-radius: 6px;
            border-bottom-left-radius: 6px;
        }

        tr[data-id] td:last-child {
            border-right: 1px solid var(--border);
            border-top-right-radius: 6px;
            border-bottom-right-radius: 6px;
        }

        tr[data-id]:hover {
            transform: scale(1.005) translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            z-index: 10;
            position: relative;
        }

        .empty-state {
            padding: 4rem;
            text-align: center;
            color: var(--muted);
            font-family: var(--display);
            text-transform: uppercase;
            font-weight: 800;
            background: var(--white);
            border-radius: 8px;
            border: 2px dashed var(--border);
        }

        /* Status Pills */
        .status-pill {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 800;
            font-family: var(--mono);
            letter-spacing: 0.5px;
        }
        .pill-success { background: var(--green-lt); color: var(--green); }
        .pill-failed { background: var(--red-lt); color: var(--red); }
        .pill-processing { background: var(--amber-lt); color: var(--amber); }

        .stat-mini-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }
        
        .stat-card {
            background: var(--white);
            padding: 1.5rem;
            border-radius: 8px;
            border-left: 4px solid var(--blue);
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* ── MOBILE ── */
        @media (max-width: 768px) {
            .history-controls {
                flex-direction: column;
                align-items: stretch;
            }
            .search-container {
                min-width: auto;
            }
            .filter-select {
                width: 100%;
            }
            .stat-mini-grid {
                grid-template-columns: 1fr 1fr;
            }
            .stat-card:nth-child(3) {
                grid-column: span 2;
            }
            .table-container {
                overflow-x: auto;
            }
            .table-container::-webkit-scrollbar {
                height: 8px;
            }
            .table-container::-webkit-scrollbar-track {
                background: var(--bg2);
                border-radius: 4px;
            }
            .table-container::-webkit-scrollbar-thumb {
                background: var(--muted);
                border-radius: 4px;
            }
            /* Reduce oversized heading */
            .history-page-title {
                font-size: 2rem !important;
            }
            /* Truncate long ID column */
            #historyTable td:first-child {
                max-width: 80px;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>
    <!-- CURSOR -->
    <div id="cursor"></div>
    <div id="cursor-ring"></div>

    <nav>
        <a href="upload.html" class="logo" style="text-decoration:none; color:inherit;">
            GST Scanner
            <span class="logo-pill">Beta</span>
        </a>
        <ul class="nav-links">
            <li><a href="upload.html">Upload</a></li>
            <li><a href="history.html" class="active">History</a></li>
            <li><a href="vendors.html">Vendors</a></li>
            <li><a href="analytics.html">Analytics</a></li>
        </ul>
        <div class="user-info">
            <span class="display-company-name" style="color: var(--blue); font-weight: 800; margin-right: 1rem; border-right: 1px solid var(--border-color); padding-right: 1rem;">Workspace</span>
            <span class="display-user-name">User</span>
            <button class="nav-btn logout-trigger" style="border:none; cursor:pointer;">Sign out</button>
        </div>
    </nav>

    <div style="padding: 120px 5% 60px; max-width: 1320px; margin: 0 auto; min-height: 100vh;">
        <header class="mb-2 animate-fade-up">
            <h1 class="brand-font history-page-title" style="font-size: 3.5rem; line-height: 1;">Invoice history</h1>
            <p style="color: var(--muted); margin-bottom: 2rem;">A record of all your processed GST invoices.</p>
        </header>

        <!-- STAT ROW -->
        <div class="stat-mini-grid animate-fade-up stagger-1">
            <div class="stat-card" style="border-left-color: var(--blue);">
                <div style="font-size: 0.8rem; font-weight: 700; color: var(--muted); margin-bottom: 8px;">Total uploads</div>
                <div id="statTotal" style="font-size: 2.5rem; font-weight: 800; font-family:var(--display); line-height: 1;">0</div>
            </div>
            <div class="stat-card" style="border-left-color: var(--green);">
                <div style="font-size: 0.8rem; font-weight: 700; color: var(--muted); margin-bottom: 8px;">Success rate</div>
                <div id="statSuccess" style="font-size: 2.5rem; font-weight: 800; font-family:var(--display); color: var(--green); line-height: 1;">0%</div>
            </div>
            <div class="stat-card" style="border-left-color: var(--red);">
                <div style="font-size: 0.8rem; font-weight: 700; color: var(--muted); margin-bottom: 8px;">Failed scans</div>
                <div id="statFailed" style="font-size: 2.5rem; font-weight: 800; font-family:var(--display); color: var(--red); line-height: 1;">0</div>
            </div>
        </div>

        <!-- HISTORY CONTROLS -->
        <div class="history-controls animate-fade-up stagger-2">
            <div class="search-container">
                <span class="search-icon" style="font-size: 0.85rem; color: var(--muted);">&#x2315;</span>
                <input type="text" id="searchInput" class="search-input" placeholder="Search GSTIN, Seller, or Invoice No...">
            </div>
            
            <div style="flex: 1; min-width: 160px;">
                <select id="statusFilter" class="filter-select">
                    <option value="">All statuses</option>
                    <option value="PENDING_REVIEW">Pending Review</option>
                    <option value="APPROVED">Approved</option>
                    <option value="REJECTED">Rejected</option>
                    <option value="SUCCESS">Success</option>
                    <option value="FAILED">Failed</option>
                    <option value="PROCESSING">Processing</option>
                </select>
            </div>
            
            <div style="flex: 1; min-width: 160px;">
                <select id="vendorFilter" class="filter-select">
                    <option value="">All vendors</option>
                </select>
            </div>

            <button id="toggleFiltersBtn" class="btn-prime" style="font-size: 0.75rem; padding: 0.8rem 1.2rem; white-space: nowrap; background: var(--ink);">
                More Filters
            </button>

            <button id="bulkExportBtn" class="btn-prime" style="font-size: 0.75rem; padding: 0.8rem 1.2rem; white-space: nowrap;">
                Export All
            </button>

            <div style="font-size: 0.85rem; color: var(--blue); font-weight: 800; font-family:var(--mono);">
                Matching records: <span id="recordCount">0</span>
            </div>
        </div>

        <!-- ADVANCED FILTERS PANEL -->
        <div id="advancedFilters" class="advanced-filters animate-fade-up stagger-2" style="display: none;">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem;">
                <div>
                    <label style="display: block; font-family: var(--mono); font-size: 0.75rem; font-weight: 700; color: var(--muted); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px;">Date From</label>
                    <input type="date" id="dateFromFilter" class="filter-select">
                </div>
                <div>
                    <label style="display: block; font-family: var(--mono); font-size: 0.75rem; font-weight: 700; color: var(--muted); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px;">Date To</label>
                    <input type="date" id="dateToFilter" class="filter-select">
                </div>
                <div>
                    <label style="display: block; font-family: var(--mono); font-size: 0.75rem; font-weight: 700; color: var(--muted); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px;">Min Amount</label>
                    <input type="number" id="amountMinFilter" class="filter-select" placeholder="0.00" step="0.01" min="0">
                </div>
                <div>
                    <label style="display: block; font-family: var(--mono); font-size: 0.75rem; font-weight: 700; color: var(--muted); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px;">Max Amount</label>
                    <input type="number" id="amountMaxFilter" class="filter-select" placeholder="999999.99" step="0.01" min="0">
                </div>
            </div>
            <div style="margin-top: 1rem; display: flex; gap: 1rem;">
                <button id="clearFiltersBtn" class="btn-outline" style="font-size: 0.75rem; padding: 0.6rem 1rem;">
                    Clear All Filters
                </button>
            </div>
        </div>

        <div id="skeletonState" class="animate-fade-up stagger-2" style="background: var(--white); border: 1px solid var(--border); border-radius: 8px; overflow: hidden;">
            <div style="background: var(--bg2); padding: 1rem 1.5rem; border-bottom: 1px solid var(--border);">
                <div class="skeleton skeleton-text" style="width: 30%; height: 10px; margin: 0;"></div>
            </div>
            <div class="skeleton-row"><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div></div>
            <div class="skeleton-row"><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div></div>
            <div class="skeleton-row"><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div></div>
            <div class="skeleton-row"><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div></div>
            <div class="skeleton-row"><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div></div>
            <div class="skeleton-row" style="border-bottom: none;"><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div></div>
        </div>

        <div class="table-container animate-fade-up stagger-3" style="display: none;">
            <table id="historyTable">
                <thead>
                    <tr>
                        <th class="brand-font sortable" data-sort="id">ID <span class="sort-icon">▼</span></th>
                        <th class="brand-font sortable" data-sort="seller_name">Seller <span class="sort-icon">▼</span></th>
                        <th class="brand-font sortable" data-sort="total">Total <span class="sort-icon">▼</span></th>
                        <th class="brand-font sortable" data-sort="status">Status <span class="sort-icon">▼</span></th>
                        <th class="brand-font sortable" data-sort="invoice_date">Date <span class="sort-icon">▼</span></th>
                        <th class="brand-font sortable" data-sort="created_at">Scanned at <span class="sort-icon">▼</span></th>
                    </tr>
                </thead>
                <tbody id="historyTableBody">
                    <!-- Rows populated by JS -->
                </tbody>
            </table>
        </div>
        
        <div id="emptyState" class="empty-state animate-fade-up stagger-3" style="display: none;">
            No invoices found
        </div>
    </div>

    <script src="js/cursor.js?v=1.2"></script>
    <script src="js/history.js?v=1.2"></script>
</body>
</html>
