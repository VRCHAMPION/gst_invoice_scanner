<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | GST Invoice Scanner</title>
    <meta name="description" content="Create a free GST Invoice Scanner account. Scan invoices, auto-calculate ITC, and get compliance health scores — no subscription required." />
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg);
        }
        .auth-left {
            flex: 1.2;
            background-color: var(--ink);
            color: white;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 1;
        }
        .auth-left::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(#ffffff11 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }
        .auth-right {
            flex: 1;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-color: var(--bg);
            overflow-y: auto;
        }
        .app-title {
            font-size: 4rem;
            line-height: 0.9;
            margin-bottom: 2rem;
        }
        .feature-list {
            list-style: none;
            margin-top: 3rem;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            font-weight: 500;
        }
        .feature-dot {
            width: 12px;
            height: 12px;
            background: var(--blue);
            border-radius: 50%;
        }
        .auth-form-card {
            max-width: 400px;
            width: 100%;
            margin: auto;
        }
        .auth-header {
            margin-bottom: 3rem;
        }
        .auth-header h2 {
            font-size: 2.5rem;
            color: var(--ink);
        }
        .tagline {
            font-size: 1.2rem;
            opacity: 0.8;
            max-width: 400px;
        }

        /* ── MOBILE ── */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
                overflow-y: auto;
            }
            .auth-left {
                display: none;
            }
            .auth-right {
                flex: 1;
                padding: 1.5rem;
                justify-content: flex-start;
                padding-top: 2.5rem;
            }
            .auth-form-card {
                max-width: 100%;
                width: 100%;
                margin: 0;
            }
            .mobile-brand-header {
                display: block;
                font-size: 1.4rem;
                font-weight: 900;
                color: var(--ink);
                letter-spacing: -0.5px;
                margin-bottom: 2rem;
                font-family: var(--display);
            }
            .auth-header h2 {
                font-size: 2rem;
            }
            .role-btn {
                padding: 0.6rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <!-- CURSOR -->
    <div id="cursor"></div>
    <div id="cursor-ring"></div>

    <div class="auth-left animate-fade-up">
        <h1 class="app-title brand-font">Join<br>10,000+<br>businesses</h1>
        <p class="tagline">Stop leaving your ITC on the table. Automate compliance easily.</p>
        
        <ul class="feature-list">
            <li class="feature-item stagger-1"><div class="feature-dot"></div> Fast and accurate OCR</li>
            <li class="feature-item stagger-2"><div class="feature-dot"></div> Automatic fraud signals</li>
            <li class="feature-item stagger-3"><div class="feature-dot"></div> Simple spend analytics</li>
        </ul>
    </div>

    <div class="auth-right animate-fade-up stagger-1">
        <div class="auth-form-card">
            <span class="mobile-brand-header" style="display: none;">GST Scanner</span>
            <div class="auth-header">
                <h2 class="brand-font">Create your account</h2>
                <p class="data-font">Set up your profile to start scanning invoices.</p>
            </div>

            <form id="registerForm">
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 800; color: var(--blue);">I want to:</label>
                    <div style="display: flex; gap: 0.5rem; background: var(--surface-light); padding: 0.3rem; border-radius: var(--radius-sm);">
                        <button type="button" class="role-btn active" data-role="owner" style="flex: 1; padding: 0.8rem; border: none; border-radius: var(--radius-sm); cursor: pointer; font-weight: 800; font-family: var(--data); background: var(--blue); color: white;">Start a workspace</button>
                        <button type="button" class="role-btn" data-role="employee" style="flex: 1; padding: 0.8rem; border: none; border-radius: var(--radius-sm); cursor: pointer; font-weight: 800; font-family: var(--data); background: transparent; color: var(--muted);">Join a workspace</button>
                    </div>
                    <input type="hidden" id="role" value="owner">
                </div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" required placeholder="e.g. Rajesh Kumar">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="name@company.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                    Get started
                </button>
            </form>

            <p class="mt-2" style="font-size: 0.9rem; color: var(--text-muted);">
                Already have an account? <a href="login.html" style="color: var(--blue); text-decoration: none; font-weight: 600;">Sign in here</a>
            </p>

            <div id="errorMessage" class="mt-1 data-font" style="color: var(--red); font-weight: 600; display: none;"></div>
        </div>
    </div>

    <script src="js/cursor.js?v=1.2"></script>
    <script src="js/config.js?v=1.2"></script>
    <script src="js/utils.js?v=1.2"></script>
    <script src="js/auth.js?v=1.2"></script>
    <script>
        // Role Selection Logic
        const roleBtns = document.querySelectorAll('.role-btn');
        const roleInput = document.getElementById('role');
        roleBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                roleBtns.forEach(b => {
                    b.classList.remove('active');
                    b.style.background = 'transparent';
                    b.style.color = 'var(--muted)';
                });
                btn.classList.add('active');
                btn.style.background = 'var(--blue)';
                btn.style.color = 'white';
                roleInput.value = btn.dataset.role;
            });
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const role = roleInput.value;
            const confirmPass = document.getElementById('confirmPassword').value;
            const error = document.getElementById('errorMessage');
            const submitBtn = e.target.querySelector('button[type="submit"]');

            if (pass !== confirmPass) {
                error.textContent = "Passwords do not match";
                error.style.display = 'block';
                return;
            }

            submitBtn.textContent = 'Getting started...';
            submitBtn.disabled = true;

            const result = await register(name, email, pass, role);
            if (result.success) {
                sessionStorage.setItem('intendedRole', role);
                window.location.href = 'upload.html';
            } else {
                error.textContent = result.message;
                error.style.display = 'block';
                submitBtn.textContent = 'Get started';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
