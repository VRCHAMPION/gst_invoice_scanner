<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating...</title>
    <style>
        body { display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif; background:#F7F5F0; }
        .loader { border:4px solid #f3f3f3; border-top:4px solid #0047FF; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; }
        @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
    </style>
</head>
<body>
    <div class="loader"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="js/config.js?v=1.2"></script>
    <script src="js/utils.js?v=1.2"></script>
    <script>
        const _supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

        async function handleCallback() {
            const { data: { session }, error } = await _supabase.auth.getSession();

            if (error || !session) {
                // If access_token is in the URL hash, wait for onAuthStateChange to fire
                if (window.location.hash.includes('access_token')) return;
                window.location.href = 'login.html';
                return;
            }

            // Exchange Supabase token for a secure HttpOnly cookie on the backend
            let userData;
            try {
                const resp = await fetch(window.getApiUrl('/api/auth/session'), {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ access_token: session.access_token }),
                });

                if (!resp.ok) {
                    console.error('Session establishment failed:', resp.status);
                    window.location.href = 'login.html';
                    return;
                }
                userData = await resp.json();
            } catch (err) {
                console.error('Network error during session establishment:', err);
                window.location.href = 'login.html';
                return;
            }

            sessionStorage.setItem('currentUser', JSON.stringify(userData));

            // Route based on onboarding state
            const onboardingComplete =
                session.user.user_metadata?.onboarding_complete || userData.company_id;

            window.location.href = onboardingComplete ? 'upload.html' : 'onboarding.html';
        }

        _supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' || event === 'INITIAL_SESSION') {
                handleCallback();
            }
        });

        // Also run immediately for non-hash-based redirects
        handleCallback();
    </script>
</body>
</html>
