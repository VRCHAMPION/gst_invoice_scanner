<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating...</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; background-color: #F7F5F0; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #0047FF; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/env.js"></script>
    <script src="js/config.js?v=1.2"></script>
    <script src="js/utils.js?v=1.2"></script>
    <script>
        const _supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        
        async function handleCallback() {
            // Give Supabase SDK a tiny bit of time to parse the hash
            const { data: { session }, error } = await _supabase.auth.getSession();
            
            if (error || !session) {
                // If there's an access_token in the URL, wait for onAuthStateChange to fire instead of redirecting immediately
                if (window.location.hash.includes('access_token')) {
                    return;
                }
                window.location.href = 'login.html';
                return;
            }
            
            const user = session.user;
            
            // Sync with backend to get current user data
            window.setToken(session.access_token);
            try {
                const resp = await window.apiFetch(window.getApiUrl('/api/me'));
                if (resp.ok) {
                    const userData = await resp.json();
                    sessionStorage.setItem('currentUser', JSON.stringify(userData));
                    
                    const onboardingComplete = user.user_metadata?.onboarding_complete || userData.company_id;
                    
                    if (!onboardingComplete) {
                        window.location.href = 'onboarding.html';
                    } else {
                        window.location.href = 'upload.html';
                    }
                } else {
                    console.error("Failed to fetch /api/me");
                    window.location.href = 'login.html';
                }
            } catch (err) {
                console.error("API fetch error:", err);
                window.location.href = 'login.html';
            }
        }
        
        _supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' || event === 'INITIAL_SESSION') {
                handleCallback();
            }
        });
        
        // Run immediately
        handleCallback();
    </script>
</body>
</html>
