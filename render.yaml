services:
  - type: web
    name: gst-invoice-scanner-api-vrc
    env: docker
    plan: free
    region: singapore # Change this to your preferred region (e.g., frankfurt, ohio)
    dockerContext: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        sync: false # Must be set in Render dashboard
      - key: GEMINI_API_KEY
        sync: false # Must be set in Render dashboard
      - key: JWT_SECRET
        sync: false # Must be set in Render dashboard
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: IS_PRODUCTION
        value: "true"
      - key: ENV
        value: "production"
      # Memory optimization for 512MB free tier
      - key: MALLOC_ARENA_MAX
        value: "2"
      - key: PYTHONMALLOC
        value: "malloc"
